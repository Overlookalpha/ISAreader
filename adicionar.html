<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adicionar Livro - ISAReader</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<div class="logo">📚</div>

<h1>Adicionar Livro</h1>

<p class="subtitulo">
Monte sua biblioteca inteligente.
</p>

<div class="card">

<input
id="titulo"
type="text"
placeholder="Título do Livro">

<br><br>

<input
id="autor"
type="text"
placeholder="Autor">

<br><br>

<select id="categoria">

<option>Filosofia</option>
<option>Finanças</option>
<option>Negócios</option>
<option>Autoajuda</option>
<option>Psicologia</option>
<option>Romance</option>
<option>Outro</option>

</select>

<br><br>

<h2>📷 Adicionar páginas</h2>

<input
id="fotos"
type="file"
accept="image/*"
multiple>

<br><br>

<p id="contadorPaginas">
Nenhuma página selecionada.
</p>

<br>

<button id="adicionarPaginas">
📷 Mostrar Páginas
</button>

<br><br>

<div
id="previewPaginas"
style="
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
">
</div>

<br>

<button id="ocr">
📖 Processar Fotos
</button>

<br><br>

<button id="ouvir">
▶️ Ouvir
</button>

<button id="pausar">
⏸️ Pausar
</button>

<button id="continuar">
▶️ Continuar
</button>

<button id="parar">
⏹️ Parar
</button>

<br><br>

<textarea
id="texto"
placeholder="O texto aparecerá aqui automaticamente..."

style="
width:100%;
height:220px;
padding:15px;
border-radius:12px;
border:none;
resize:vertical;
">
</textarea>

<br><br>

<button id="salvar">
💾 Salvar Livro
</button>

<br><br>

<button
class="secundario"
onclick="window.location='biblioteca.html'">

⬅️ Voltar

</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import { getAuth } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import Tesseract from "https://cdn.jsdelivr.net/npm/tesseract.js@5/+esm";

const firebaseConfig = {

apiKey:"AIzaSyDmCuCiQ51w6bHFi_Qz3R8dy6u7DvsG43g",
authDomain:"isareader.firebaseapp.com",
projectId:"isareader",
storageBucket:"isareader.firebasestorage.app",
messagingSenderId:"988100220646",
appId:"1:988100220646:web:441ecb3100845bf3460d27"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const paginas = document.getElementById("fotos");
const contador = document.getElementById("contadorPaginas");
const preview = document.getElementById("previewPaginas");
const texto = document.getElementById("texto");

paginas.addEventListener("change", () => {

    contador.innerHTML =
        `📷 ${paginas.files.length} página(s) selecionada(s).`;

});

document.getElementById("adicionarPaginas").onclick = () => {

    preview.innerHTML = "";

    if (paginas.files.length === 0) {
        alert("Selecione as páginas primeiro.");
        return;
    }

    [...paginas.files].forEach((arquivo, indice) => {

        const reader = new FileReader();

        reader.onload = (e) => {

            const card = document.createElement("div");

            card.style.background = "#1b1b1b";
            card.style.borderRadius = "12px";
            card.style.padding = "8px";
            card.style.textAlign = "center";

            card.innerHTML = `
                <img
                    src="${e.target.result}"
                    style="
                        width:100%;
                        border-radius:8px;
                    ">
                <div style="margin-top:6px">
                    Página ${indice + 1}
                </div>
            `;

            preview.appendChild(card);

        };

        reader.readAsDataURL(arquivo);

    });

};

document.getElementById("ocr").onclick = async () => {

    if (paginas.files.length === 0) {
        alert("Selecione as páginas primeiro.");
        return;
    }

    texto.value = "";

    for (let i = 0; i < paginas.files.length; i++) {

        texto.value += `
            \n📖 Processando página ${i + 1} de ${paginas.files.length}...\n\n`;

        const {
            data
        } = await Tesseract.recognize(
            paginas.files[i],
            "por"
        );

        texto.value += data.text + "\n\n";

    }

    alert("OCR concluído!");

};

  document.getElementById("salvar").onclick = async () => {

    const user = auth.currentUser;

    if (!user) {
        alert("Faça login primeiro.");
        return;
    }

    try {

        await addDoc(collection(db, "livros"), {

            uid: user.uid,
            titulo: document.getElementById("titulo").value,
            autor: document.getElementById("autor").value,
            categoria: document.getElementById("categoria").value,
            texto: texto.value,

            progresso: 0,
            paginaAtual: 1,
            favorito: false,
            criadoEm: serverTimestamp()

        });

        alert("Livro salvo com sucesso!");

        window.location = "biblioteca.html";

    } catch (erro) {

        console.error(erro);
        alert(erro.message);

    }

};

const leitor = window.speechSynthesis;

let fala = null;

function falarTexto() {

    if (!texto.value.trim()) {
        alert("Não há texto para ler.");
        return;
    }

    leitor.cancel();

    fala = new SpeechSynthesisUtterance(texto.value);

    fala.lang = "pt-BR";
    fala.rate = 1;
    fala.pitch = 1;

    leitor.speak(fala);

}
  document.getElementById("ouvir").onclick = () => {
    falarTexto();
};

document.getElementById("pausar").onclick = () => {
    window.speechSynthesis.pause();
};

document.getElementById("continuar").onclick = () => {
    window.speechSynthesis.resume();
};

document.getElementById("parar").onclick = () => {
    window.speechSynthesis.cancel();
};
  </script>

</body>

</html>
