<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Entrar - ISAReader</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<div class="logo">
📚🤖
</div>

<h1>Bem-vindo!</h1>

<p class="subtitulo">
Entre para continuar seus estudos.
</p>

<div class="card">

<input
id="email"
type="email"
placeholder="Seu e-mail">

<br><br>

<input
id="senha"
type="password"
placeholder="Sua senha">

<br><br>

<button id="login">
🔓 Entrar
</button>

<button id="cadastro" class="secundario">
✨ Criar Conta
</button>

<p style="margin-top:20px;text-align:center;opacity:.7">
Esqueceu sua senha?<br>
Em breve recuperação automática.
</p>

</div>

<button class="secundario"
onclick="window.location='index.html'">
⬅️ Voltar
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyDmCuCiQ51w6bHFi_Qz3R8dy6u7DvsG43g",

authDomain:"isareader.firebaseapp.com",

projectId:"isareader",

storageBucket:"isareader.firebasestorage.app",

messagingSenderId:"988100220646",

appId:"1:988100220646:web:441ecb3100845bf3460d27"
};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const email=document.getElementById("email");
const senha=document.getElementById("senha");

document.getElementById("cadastro").onclick=()=>{

createUserWithEmailAndPassword(
auth,
email.value,
senha.value
)

.then(()=>{

alert("Conta criada com sucesso!");

})

.catch(e=>alert(e.message));

};

document.getElementById("login").onclick=()=>{

signInWithEmailAndPassword(
auth,
email.value,
senha.value
)

.then(()=>{

window.location="biblioteca.html";

})

.catch(e=>{

alert("Erro: "+e.message);

});

};

</script>

</body>

</html>
